<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>
    <p>Colocando videos de hospedagem própria</p>
    <p>Os padroes mais utilizados são: MP4,M4v, WebM e OGG</p>
    <h1>Video hospedado</h1>
    <p>Video hospedado e colocado da forma mais simples</p>
    <video src="midia/videoneve.mp4" width="500px" controls></video>

    <p>Video hospedado e colocado de forma compativel com todos os navegadores</p>
    <video controls width="500px">
        <source src="midia/videoneve.mp4" type="video/mp4">
        <source src="midia/videoneve.webm" type="video/webm">
        <source src="midia/videoneve.ogg" type="video/ogg">
        <p>Seu navegador não suporta o video. Clique <a href="midia/videoneve.mp4">aqui</a> para baixar o video</p>

    </video>

</body>

</html>
