<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Colocando audio</title>
</head>

<body>
    <h1>Colocando áudio</h1>
    <p>A maneira mais simples de tocar um audio é:</p>
    <audio src="midia/Fire In The Sky - Alex Jones _ Xander Jones.mp3" controls autoplay></audio>
    <p>Os audios compatíveis com os navegadores são: MP3, WAV e OGG</p>
    <p>A maneira de deixar compativel com todos os navegadores é :</p>

    <audio preload="metadata" autoplay controls loop>
        <source src="midia/Fire In The Sky - Alex Jones _ Xander Jones.mp3" type="audio/mpeg">
        <source src="midia/Fire In The Sky - Alex Jones _ Xander Jones.ogg" type="audio/ogg">
        <source src="midia/Fire In The Sky - Alex Jones _ Xander Jones.wav" type="audio/wav">
        <p>Infelizmente, o navegador não suporta o áudio.clique <a
                href="midia/Fire In The Sky - Alex Jones _ Xander Jones.mp3">aqui</a> para baixar p audio</p>
        <!--Não usar wav porque é muito pesado-->


    </audio>
</body>

</html>
