<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulario teste </title>
    <style>
        form {
            color: white;
            font-size: large;
        }

        .personal-data {
            background-color: darkblue;

        }

        h2 {
            text-align: center;

        }
    </style>

</head>

<body>
    <h1>Formulario canditato</h1>
    <form action="#">
        <section class="personal-data">
            <h2>Dados Pessoais</h2>

            <label for="nome">Nome:</label>
            <input type="text" name="nome" id="nome" placeholder="João Silva" required autocomplete="off"><br>
            <br>
            <label for="email">Email:</label>
            <input type="email" name="email" id="email" placeholder="joao.silva@email.com"><br>
            <br>
            <label for="data_nascimento">Data Nascimento</label>
            <input type="date" name="data_nascimento" required><br>
            <br>
            <label for="genero">Gênero:</label><br>
            <input type="radio" name="genero" id="feminino" value="feminino">Feminino <br>
            <input type="radio" name="genero" id="masculino" value="masculino">Masculino <br>
            <br>
            <label for="photo">Foto:</label>
            <input type="file" name="photo" id="photo" accept=".png, .jpeg" multiple><br>
            <br>
            <label for="idade">Idade:</label>
            <input type="number" name="idade" id="idade" placeholder="Idade" min="0" max="120"><br>
            <br>
            <label for="senha">Senha:</label>
            <input type="password" name="senha" id="senha" required><br>
            <br>
            <label for="confirmar_senha">Confirmar Senha:</label>
            <input type="password" name="confirmar_senha" id="confirmar_senha" required><br>
            <br>

        </section>
        <br>
        <button type="submit">Enviar</button>
        <button type="reset">Limpar formulario</button>



    </form>

</body>

</html>
